<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoevaluación MAGIC® — Checklist de los 7 criterios</title>
<meta name="description" content="Autoevaluación y auditoría del Modelo MAGIC®: datos de cliente, 7 criterios, 70 preguntas, escala 0–100, evidencias e informe.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230b0d12'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23d4b06a' stroke-width='1'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23d4b06a' stroke-width='1' opacity='.6'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23d4b06a'/%3E%3C/svg%3E">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0b0d12">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"></noscript>
<style>
  :root{--bg:#0b0d12;--bg-2:#11141b;--bg-3:#161a23;--line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.18);--ink:#e9ecf2;--ink-dim:#a8aebb;--ink-faint:#8a90a0;--accent:#d4b06a;--accent-soft:rgba(212,176,106,.12);--audit:#6aa6d4;--audit-soft:rgba(106,166,212,.12);--sans:"Manrope",system-ui,sans-serif;--mono:"Manrope",ui-monospace,monospace}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(900px 500px at 80% -10%,rgba(212,176,106,.06),transparent 60%),var(--bg);min-height:100vh;display:flex;flex-direction:column}
  h1,h2,h3,h4,h5{font-weight:600;letter-spacing:-.02em}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline;text-underline-offset:2px}
  img{display:block;max-width:100%}
  .container{max-width:1100px;margin:0 auto;padding:0 32px;position:relative}
  @media (max-width:680px){.container{padding:0 20px}}

  .nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(11,13,18,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;gap:16px;padding:14px 32px;max-width:1240px;margin:0 auto}
  @media (max-width:680px){.nav-inner{padding:14px 20px}}
  .brand-logo{height:28px;width:auto}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .who{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-dim);text-align:right}
  .who b{display:block;color:var(--ink);font-size:12px}
  .role-badge{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-top:2px}
  .role-cliente{background:var(--accent-soft);color:var(--accent)}
  .role-auditor{background:var(--audit-soft);color:var(--audit)}
  .role-superadmin{background:rgba(160,120,220,.15);color:#b89be0}
  .link-btn{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);background:transparent;border:0;cursor:pointer}
  .link-btn:hover{color:var(--accent)}

  header.page-head{padding:108px 0 24px;text-align:center}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:14px;display:inline-flex;align-items:center;gap:14px}
  .eyebrow::before,.eyebrow::after{content:"";width:24px;height:1px;background:var(--accent)}
  header.page-head h1{font-weight:500;font-size:clamp(26px,4vw,44px);line-height:1.08;letter-spacing:-.03em;margin:0 auto 8px;max-width:780px}
  header.page-head h1 em{color:var(--accent);font-style:normal;font-weight:700}

  main{flex:1;padding:18px 0 90px}
  .loading{max-width:460px;margin:60px auto;text-align:center;color:var(--ink-faint);font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase}

  /* Selector de evaluación */
  .picker{max-width:620px;margin:0 auto}
  .picker .box{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:30px 32px;margin-bottom:18px}
  .picker h3{margin:0 0 14px;font-size:16px;color:#fff}
  .eval-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:8px;background:var(--bg);margin-bottom:10px;cursor:pointer;transition:.18s}
  .eval-row:hover{border-color:var(--accent)}
  .eval-row .er-main{flex:1}
  .eval-row .er-org{font-weight:600;color:var(--ink)}
  .eval-row .er-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-faint);text-transform:uppercase;margin-top:3px}
  .eval-row .er-arrow{color:var(--ink-faint)}
  .newrow{display:flex;gap:10px;margin-top:6px}
  .newrow input{flex:1;border:1px solid var(--line-strong);border-radius:8px;padding:12px 14px;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--bg)}
  .newrow input:focus{outline:0;border-color:var(--accent)}
  .empty{color:var(--ink-faint);font-size:13.5px;padding:8px 0}

  .btn{border:0;border-radius:999px;padding:13px 22px;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:.2s;background:var(--accent);color:#1a1407}
  .btn:hover{background:#e0c184}.btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--accent);border:1px solid rgba(212,176,106,.4);padding:10px 16px;border-radius:999px;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.2s;white-space:nowrap;text-align:center}
  .btn-ghost:hover{background:var(--accent-soft);border-color:var(--accent)}

  .app{display:none}.app.show{display:block}

  .global-bar{max-width:1000px;margin:0 auto 20px;display:flex;align-items:center;gap:24px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:20px 26px}
  .global-gauge{position:relative;width:88px;height:88px;flex:none}
  .global-gauge svg{transform:rotate(-90deg)}
  .global-gauge .val{position:absolute;inset:0;display:grid;place-items:center;font-weight:700;font-size:20px;color:#fff}
  .global-gauge .val small{display:block;font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--ink-faint);font-weight:600}
  .global-meta{flex:1}
  .global-meta .org{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .global-meta h3{font-size:16px;font-weight:600;margin:0 0 4px;color:#fff}
  .global-meta p{font-size:13px;color:var(--ink-dim);margin:0}
  .global-actions{display:flex;flex-direction:column;gap:9px}
  @media (max-width:680px){.global-bar{flex-direction:column;text-align:center}.global-actions{flex-direction:row;flex-wrap:wrap;justify-content:center}}

  .tabs{max-width:1000px;margin:0 auto 24px;display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
  .tab{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:104px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--bg-2);cursor:pointer;transition:.2s;position:relative}
  .tab:hover{border-color:var(--line-strong)}
  .tab.active{border-color:var(--accent);background:var(--accent-soft)}
  .tab .cn{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-faint);font-weight:700}
  .tab.active .cn{color:var(--accent)}
  .tab .ct{font-size:11px;font-weight:600;color:var(--ink-dim);text-align:center;line-height:1.25}
  .tab.active .ct{color:#fff}
  .tab .cscore{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink)}
  .tab .cprog{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);border-radius:0 2px 2px 0;transition:width .4s}
  .tab.datos .cn{color:var(--audit)}

  .panel{max-width:980px;margin:0 auto}
  .crit-head{margin:0 0 18px}
  .crit-head .kk{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .crit-head h2{font-size:22px;font-weight:600;margin:0;color:#fff}

  .bloque-tag{display:flex;align-items:center;gap:14px;margin:28px 0 14px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .bloque-tag::after{content:"";flex:1;height:1px;background:var(--line)}

  .q{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.004));border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden;transition:border-color .3s}
  .q.answered{border-color:rgba(212,176,106,.28)}
  .q-head{padding:20px 24px;display:flex;gap:15px;align-items:flex-start;cursor:pointer}
  .q-cod{flex:none;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--accent);border:1px solid rgba(212,176,106,.35);padding:5px 9px;border-radius:5px;margin-top:2px}
  .q-cod.done{background:var(--accent);color:#1a1407;border-color:var(--accent)}
  .q-text{flex:1}.q-text .qt{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.45}
  .q-text .qb{font-family:var(--mono);font-size:10px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.12em;margin-top:5px}
  .q-pill{flex:none;font-family:var(--mono);font-weight:700;font-size:13px;padding:7px 13px;border-radius:999px;color:#1a1407;background:var(--line-strong);margin-top:1px;min-width:42px;text-align:center}
  .chev{flex:none;color:var(--ink-faint);transition:.25s;margin-top:6px}.q.open .chev{transform:rotate(180deg)}
  .q-body{display:none;padding:0 24px 22px;border-top:1px solid var(--line)}.q.open .q-body{display:block}

  .ctx{margin:18px 0 4px;padding:13px 16px;background:var(--bg);border:1px solid var(--line);border-radius:8px;border-left:2px solid var(--accent)}
  .ctx .ctx-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
  .ctx p{margin:0;font-size:13px;color:var(--ink-dim);line-height:1.55}

  .scale{display:grid;gap:9px;margin:18px 0 6px}
  .opt{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-radius:8px;padding:13px 15px;cursor:pointer;transition:.18s;background:var(--bg)}
  .opt:hover{border-color:var(--line-strong)}.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
  .opt .mark{flex:none;width:48px;height:48px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#1a1407;font-weight:700;font-size:14px;font-family:var(--mono);line-height:1.05}
  .opt .mark small{font-size:7.5px;font-weight:600;opacity:.85;margin-top:1px}
  .opt .desc{flex:1;font-size:13.5px;color:var(--ink-dim);line-height:1.5;padding-top:3px}.opt.sel .desc{color:var(--ink)}
  .opt.disabled{opacity:.7;cursor:default}.opt.disabled:hover{border-color:var(--line)}

  .field-label{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin:20px 0 8px}
  textarea.ta,input.inp{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:13px 15px;font-family:var(--sans);font-size:14.5px;color:var(--ink);background:var(--bg);transition:.2s}
  textarea.ta{min-height:78px;resize:vertical}
  textarea.ta::placeholder,input.inp::placeholder{color:var(--ink-faint)}
  textarea.ta:focus,input.inp:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea.ta:disabled,input.inp:disabled{opacity:.6;cursor:not-allowed}

  .evid{margin-top:14px;border:1px solid var(--line);border-radius:8px;background:var(--bg);overflow:hidden}
  .evid summary{list-style:none;cursor:pointer;padding:12px 16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
  .evid summary::-webkit-details-marker{display:none}.evid summary .arw{transition:.25s}.evid[open] summary .arw{transform:rotate(90deg)}
  .evid .evid-body{padding:0 16px 14px;font-size:13px;color:var(--ink-dim);line-height:1.7;white-space:pre-line}

  .dropzone{border:1.5px dashed var(--line-strong);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:.18s;background:var(--bg);color:var(--ink-faint);font-size:13.5px}
  .dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .dropzone b{color:var(--accent)}.dropzone small{display:block;margin-top:4px;font-size:11.5px;color:var(--ink-faint)}
  .doclist{list-style:none;margin:12px 0 0;padding:0;display:grid;gap:8px}
  .doclist li{display:flex;align-items:center;gap:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:7px;padding:11px 14px;font-size:13.5px}
  .doclist .fi{flex:none;width:34px;height:34px;border-radius:6px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;color:var(--accent);font-family:var(--mono);font-weight:700;font-size:9px}
  .doclist .fn{flex:1;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .doclist .fs{color:var(--ink-faint);font-family:var(--mono);font-size:11px}
  .doclist .del{border:0;background:transparent;color:#e0564f;cursor:pointer;font-weight:700;font-size:18px;padding:0 4px;line-height:1}
  .saverow{display:flex;align-items:center;gap:14px;margin-top:18px;flex-wrap:wrap}
  .savestate{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}.savestate.saved{color:#5ba897}

  /* Bloque auditor */
  .auditor-box{margin-top:26px;border:1px solid var(--audit);border-radius:8px;background:var(--audit-soft);padding:20px 22px}
  .auditor-box .ab-l{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--audit);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .auditor-box .ab-sub{font-size:12px;color:var(--ink-faint);margin-bottom:14px}
  .auditor-box textarea.ta{border-color:rgba(106,166,212,.35)}
  .auditor-box textarea.ta:focus{border-color:var(--audit);box-shadow:0 0 0 3px var(--audit-soft)}

  /* Datos cliente / sedes */
  .form-card{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:24px 26px;margin-bottom:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.grid2{grid-template-columns:1fr}}
  .sede{border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:12px;background:var(--bg)}
  .sede-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sede-head h4{margin:0;font-size:14px;color:var(--ink)}
  .sede-del{border:0;background:transparent;color:#e0564f;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
  .add-sede{margin-top:6px}
  .empresa-card{border:1px solid var(--line-strong);border-radius:10px;padding:20px 22px;margin-bottom:18px;background:var(--bg-2)}
  .empresa-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .empresa-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:4px 11px;border-radius:999px;font-weight:700}
  .centros-wrap{margin-top:16px;padding-left:16px;border-left:2px solid var(--line)}
  .centro{border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--bg)}
  .centro-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .centro-head h5{margin:0;font-size:12.5px;color:var(--ink-dim);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}

  .crit-nav{max-width:980px;margin:30px auto 0;display:flex;justify-content:space-between;gap:12px}
  .crit-nav button{background:var(--bg-2);border:1px solid var(--line);color:var(--ink);padding:13px 22px;border-radius:999px;font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:.2s}
  .crit-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.crit-nav button:disabled{opacity:.35;cursor:not-allowed}

  footer{border-top:1px solid var(--line);padding:48px 0 30px;background:var(--bg-2);margin-top:40px}
  .foot-grid{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
  .foot-grid small{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink-faint);text-transform:uppercase}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#1a1407;padding:13px 24px;border-radius:999px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;font-weight:700;box-shadow:0 16px 40px rgba(0,0,0,.5);transition:.3s;opacity:0;z-index:100}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(26,20,7,.3);border-top-color:#1a1407;border-radius:50%;animation:r .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes r{to{transform:rotate(360deg)}}
  @media print{.nav,footer,.global-actions,.dropzone,.chev,.tabs,.crit-nav,.saverow{display:none!important}.q-body{display:block!important}body{background:#fff;color:#000}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" aria-label="MAGIC® — Inicio"><picture><source srcset="assets/magic_logo-sm.webp" type="image/webp"><img src="assets/magic_logo.png" alt="MAGIC®" class="brand-logo" width="229" height="72"></picture></a>
    <div class="nav-right">
      <span class="who" id="who"></span>
      <button class="link-btn" id="panelLink" style="display:none" onclick="location.href='panel.html'">Panel</button>
      <button class="link-btn" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>
</nav>

<header class="page-head">
  <div class="container">
    <div class="eyebrow">Autoevaluación MAGIC®</div>
    <h1>Checklist de <em>madurez</em></h1>
  </div>
</header>

<main>
  <div class="container">
    <div class="loading" id="loading">Cargando…</div>

    <!-- Selector de evaluación -->
    <section class="picker" id="picker" style="display:none">
      <div class="box">
        <h3>Tus evaluaciones</h3>
        <div id="evalList"></div>
      </div>
      <div class="box" id="newBox">
        <h3>Nueva evaluación</h3>
        <div class="newrow">
          <input id="newOrg" type="text" placeholder="Nombre de la organización">
          <button class="btn" onclick="crearEval()">Crear</button>
        </div>
      </div>
    </section>

    <!-- App de evaluación -->
    <section class="app" id="app">
      <div class="global-bar">
        <div class="global-gauge">
          <svg width="88" height="88"><circle cx="44" cy="44" r="37" stroke="rgba(255,255,255,.08)" stroke-width="9" fill="none"/><circle id="gGauge" cx="44" cy="44" r="37" stroke="#d4b06a" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="232.5" stroke-dashoffset="232.5"/></svg>
          <div class="val"><span id="gScore">0</span><small id="gOf">0/70</small></div>
        </div>
        <div class="global-meta">
          <div class="org" id="orgName">—</div>
          <h3>Puntuación global MAGIC®</h3>
          <p>Media de las 70 preguntas, en escala 0–100. <span id="gLevel"></span></p>
        </div>
        <div class="global-actions">
          <button class="btn-ghost" onclick="volverPicker()">← Mis evaluaciones</button>
          <button class="btn-ghost" id="btnInforme" onclick="descargarInforme()">Informe PDF</button>
          <button class="btn-ghost" id="btnZip" onclick="descargarZip()">Descargar evidencias (ZIP)</button>
        </div>
      </div>

      <div class="tabs" id="tabs"></div>
      <div class="panel" id="panelContent"></div>

      <div class="crit-nav">
        <button id="prevBtn" onclick="cambiarTab(-1)">← Anterior</button>
        <button id="nextBtn" onclick="cambiarTab(1)">Siguiente →</button>
      </div>
    </section>
  </div>
</main>

<footer>
  <div class="container"><div class="foot-grid">
    <small>© 2026 Instituto de Excelencia Europea</small>
    <small>MAGIC® — Modelo Avanzado de Gestión, Innovación y Cambio</small>
  </div></div>
</footer>

<div class="toast" id="toast"></div>

<script src="assets/magic-auth.js"></script>
<script src="assets/magic-data.js"></script>
<script src="assets/magic-terminos.js"></script>
<script>
const ESCALA=[0,20,40,60,80,100];
const NIVEL_LBL=['Inicial','Incipiente','Definido','Desplegado','Integrado','Referente'];
const COLORS={0:'#b25b54',20:'#c2823f',40:'#cba94d',60:'#9ab464',80:'#6fae7e',100:'#5ba897'};
const NIVELES=[{min:0,t:'Inicial',c:'#b25b54'},{min:20,t:'Incipiente',c:'#c2823f'},{min:40,t:'Definido',c:'#cba94d'},{min:60,t:'Desplegado',c:'#9ab464'},{min:80,t:'Integrado',c:'#6fae7e'},{min:95,t:'Referente',c:'#5ba897'}];

let PERFIL=null, esAuditor=false, MODELO=null;
let EVAL=null, RESP={}, DOCS={}, AUDIT={}, CLIENTE=null, EMPRESAS=[], CENTROS=[];
let tabActual=0; // 0 = Datos cliente; 1..7 = criterios

document.addEventListener('magic-ready', init);

async function init(){
  const s = await MagicAuth.requiereSesion('login.html');
  if(!s) return;
  PERFIL = await MagicAuth.perfil();
  // Pantalla de RGPD + disclaimer en el primer acceso
  const ok = await MagicTerminos.exigir(PERFIL);
  if(!ok) return;
  esAuditor = PERFIL && (PERFIL.rol==='auditor'||PERFIL.rol==='superadmin');
  if(esAuditor){ const okc = await MagicTerminos.exigirConfidencialidad(PERFIL); if(!okc) return; }
  document.getElementById('who').innerHTML = `<b>${esc(PERFIL.nombre||PERFIL.email)}</b><span class="role-badge role-${PERFIL.rol}">${PERFIL.rol}</span>`;
  if(esAuditor) document.getElementById('panelLink').style.display='inline-block';
  // Cargar modelo
  MODELO = await (await fetch('assets/magic-model.json')).json();
  // ¿viene una evaluación por URL?
  const params=new URLSearchParams(location.search);
  const eid=params.get('eval');
  document.getElementById('loading').style.display='none';
  if(eid){ await abrirEval(eid); }
  else { await mostrarPicker(); }
}

async function cerrarSesion(){ await MagicAuth.salir(); location.href='login.html'; }

/* ---------- PICKER ---------- */
async function mostrarPicker(){
  document.getElementById('app').classList.remove('show');
  document.getElementById('picker').style.display='block';
  // Los auditores crean evaluaciones desde el panel; clientes desde aquí
  document.getElementById('newBox').style.display = esAuditor ? 'none':'block';
  const list=document.getElementById('evalList');
  list.innerHTML='<div class="empty">Cargando…</div>';
  try{
    const evals=await MagicData.misEvaluaciones();
    if(!evals.length){ list.innerHTML='<div class="empty">Aún no tienes evaluaciones'+(esAuditor?' asignadas.':'. Crea una abajo para empezar.')+'</div>'; return; }
    list.innerHTML='';
    evals.forEach(ev=>{
      const row=document.createElement('div');row.className='eval-row';row.onclick=()=>abrirEval(ev.id);
      row.innerHTML=`<div class="er-main"><div class="er-org">${esc(ev.organizacion)}</div><div class="er-meta">${ev.estado} · ${new Date(ev.creado_en).toLocaleDateString('es-ES')}</div></div><span class="er-arrow">→</span>`;
      list.appendChild(row);
    });
  }catch(e){ list.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'; }
}
async function crearEval(){
  const org=document.getElementById('newOrg').value.trim();
  if(!org){toast('Indica el nombre de la organización');return;}
  try{ const ev=await MagicData.crearEvaluacion(org); document.getElementById('newOrg').value=''; abrirEval(ev.id); }
  catch(e){ toast('Error: '+e.message); }
}
function volverPicker(){ history.replaceState(null,'','evaluar.html'); mostrarPicker(); }

/* ---------- ABRIR EVALUACIÓN ---------- */
async function abrirEval(eid){
  try{
    EVAL=await MagicData.getEvaluacion(eid);
  }catch(e){ toast('No tienes acceso a esa evaluación'); return mostrarPicker(); }
  history.replaceState(null,'','evaluar.html?eval='+eid);
  RESP={};DOCS={};AUDIT={};
  (await MagicData.getRespuestas(eid)).forEach(x=>RESP[x.pregunta_cod]={puntuacion:x.puntuacion,justificacion:x.justificacion||''});
  (await MagicData.getDocumentos(eid)).forEach(x=>{(DOCS[x.pregunta_cod]=DOCS[x.pregunta_cod]||[]).push(x);});
  (await MagicData.getAuditorCriterios(eid)).forEach(x=>AUDIT[x.criterio]={puntos_fuertes:x.puntos_fuertes||'',areas_mejora:x.areas_mejora||''});
  CLIENTE=await MagicData.getClienteDatos(eid);
  EMPRESAS=await MagicData.getEmpresas(eid);
  CENTROS=await MagicData.getCentros(eid);
  document.getElementById('orgName').textContent=EVAL.organizacion;
  document.getElementById('btnInforme').style.display=esAuditor?'block':'none';
  document.getElementById('btnZip').style.display=esAuditor?'block':'none';
  document.getElementById('picker').style.display='none';
  document.getElementById('app').classList.add('show');
  tabActual=0; renderTabs(); renderTab(); actualizarGlobal();
}

/* ---------- TABS ---------- */
function renderTabs(){
  const cont=document.getElementById('tabs');cont.innerHTML='';
  // Tab 0: Datos del cliente
  const t0=document.createElement('div');t0.className='tab datos'+(tabActual===0?' active':'');
  t0.onclick=()=>{tabActual=0;renderTabs();renderTab();scrollTop();};
  t0.innerHTML='<span class="cn">DATOS</span><span class="ct">Cliente y sedes</span><span class="cscore">·</span>';
  cont.appendChild(t0);
  MODELO.criterios.forEach((c,i)=>{
    const idx=i+1;
    const tab=document.createElement('div');tab.className='tab'+(tabActual===idx?' active':'');
    tab.onclick=()=>{tabActual=idx;renderTabs();renderTab();scrollTop();};
    tab.innerHTML=`<span class="cn">C${c.num}</span><span class="ct">${esc(c.titulo)}</span><span class="cscore" id="cscore-${idx}">—</span><span class="cprog" id="cprog-${idx}" style="width:0"></span>`;
    cont.appendChild(tab);
  });
  actualizarTabs();
}
function actualizarTabs(){
  MODELO.criterios.forEach((c,i)=>{
    const idx=i+1;
    const vals=c.preguntas.map(q=>RESP[q.codigo]?.puntuacion).filter(v=>v!=null);
    const media=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
    const sc=document.getElementById('cscore-'+idx);const pr=document.getElementById('cprog-'+idx);
    if(sc){sc.textContent=media!=null?media:'—';sc.style.color=media!=null?COLORS[nearest(media)]:'var(--ink)';}
    if(pr){pr.style.width=(vals.length/c.preguntas.length*100)+'%';}
  });
}
function nearest(m){return ESCALA.reduce((p,v)=>Math.abs(v-m)<Math.abs(p-m)?v:p,0);}
function cambiarTab(d){const n=tabActual+d;if(n<0||n>MODELO.criterios.length)return;tabActual=n;renderTabs();renderTab();scrollTop();}
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}

/* ---------- RENDER DE LA PESTAÑA ACTIVA ---------- */
function renderTab(){
  document.getElementById('prevBtn').disabled=(tabActual===0);
  document.getElementById('nextBtn').disabled=(tabActual===MODELO.criterios.length);
  if(tabActual===0){ renderDatosCliente(); return; }
  renderCriterio(MODELO.criterios[tabActual-1]);
}

/* ----- Pestaña Datos del cliente + sedes ----- */
function renderDatosCliente(){
  const c=CLIENTE||{};
  const panel=document.getElementById('panelContent');
  panel.innerHTML=`
    <div class="crit-head"><div class="kk">Datos del cliente</div><h2>Identificación de la organización</h2></div>
    <div class="form-card">
      <label class="field-label">Alcance de la evaluación</label>
      <textarea class="ta" id="cd-alcance" placeholder="Actividades, procesos o unidades incluidas en el alcance…">${esc(c.alcance||'')}</textarea>
      <div class="saverow"><button class="btn-ghost" onclick="guardarCliente()">Guardar alcance</button><span class="savestate" id="cd-state"></span></div>
    </div>

    <div class="crit-head" style="margin-top:30px"><div class="kk">Empresas y centros de trabajo</div><h2>CIF del grupo y sus centros</h2></div>
    <p style="color:var(--ink-faint);font-size:13px;margin:-6px 0 16px">Añade cada empresa (CIF y razón social) y, dentro de cada una, sus centros de trabajo con su dirección y número de trabajadores.</p>
    <div id="empresasWrap"></div>
    <button class="btn-ghost" onclick="anadirEmpresa()">+ Añadir empresa (CIF)</button>
    <div style="margin-top:18px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint);text-transform:uppercase">Total trabajadores del grupo: <b id="totalTrab" style="color:var(--accent)">0</b></div>
  `;
  renderEmpresas();
}

function centrosDe(empId){ return CENTROS.filter(c=>c.empresa_id===empId); }

function renderEmpresas(){
  const wrap=document.getElementById('empresasWrap');wrap.innerHTML='';
  if(!EMPRESAS.length){ wrap.innerHTML='<div class="empty" style="color:var(--ink-faint);font-size:13.5px;margin-bottom:12px">Aún no hay empresas. Añade la primera con su CIF y razón social.</div>'; }
  EMPRESAS.forEach((emp,ei)=>{
    const div=document.createElement('div');div.className='empresa-card';
    const cs=centrosDe(emp.id);
    div.innerHTML=`
      <div class="empresa-head">
        <span class="empresa-tag">Empresa ${ei+1}</span>
        <button class="sede-del" onclick="borrarEmpresa('${emp.id}')">Eliminar empresa</button>
      </div>
      <div class="grid2">
        <div><label class="field-label">Razón social</label><input class="inp" data-ei="${emp.id}" data-ef="razon_social" placeholder="Razón social" value="${esc(emp.razon_social||'')}"></div>
        <div><label class="field-label">CIF</label><input class="inp" data-ei="${emp.id}" data-ef="cif" placeholder="CIF / NIF" value="${esc(emp.cif||'')}"></div>
      </div>
      <div class="saverow"><button class="btn-ghost" onclick="guardarEmpresa('${emp.id}')">Guardar empresa</button><span class="savestate" id="emp-state-${emp.id}"></span></div>

      <div class="centros-wrap" id="centros-${emp.id}"></div>
      <button class="btn-ghost" style="margin-top:10px" onclick="anadirCentro('${emp.id}')">+ Añadir centro de trabajo</button>
    `;
    wrap.appendChild(div);
    renderCentros(emp.id);
  });
  recalcTrab();
}

function renderCentros(empId){
  const cont=document.getElementById('centros-'+empId);if(!cont)return;
  const cs=centrosDe(empId);
  cont.innerHTML = cs.length ? '' : '<div class="empty" style="color:var(--ink-faint);font-size:12.5px;margin-top:10px">Sin centros aún.</div>';
  cs.forEach((ct,ci)=>{
    const div=document.createElement('div');div.className='centro';
    div.innerHTML=`
      <div class="centro-head"><h5>Centro ${ci+1}</h5><button class="sede-del" onclick="borrarCentro('${ct.id}','${empId}')">Eliminar</button></div>
      <div class="grid2">
        <div><label class="field-label">Nombre / referencia</label><input class="inp" data-ci="${ct.id}" data-cf="nombre" placeholder="Sede central" value="${esc(ct.nombre||'')}"></div>
        <div><label class="field-label">Nº trabajadores</label><input class="inp" type="number" min="0" data-ci="${ct.id}" data-cf="trabajadores" placeholder="0" value="${ct.trabajadores!=null?ct.trabajadores:''}"></div>
      </div>
      <label class="field-label">Dirección</label>
      <input class="inp" data-ci="${ct.id}" data-cf="direccion" placeholder="Calle, nº, CP, localidad" value="${esc(ct.direccion||'')}">
      <div class="saverow"><button class="btn-ghost" onclick="guardarCentro('${ct.id}')">Guardar centro</button><span class="savestate" id="centro-state-${ct.id}"></span></div>`;
    cont.appendChild(div);
  });
  cont.querySelectorAll('input[data-cf="trabajadores"]').forEach(inp=>inp.addEventListener('input',recalcTrab));
}

function recalcTrab(){
  let tot=0;
  document.querySelectorAll('input[data-cf="trabajadores"]').forEach(inp=>tot+=parseInt(inp.value)||0);
  const el=document.getElementById('totalTrab');if(el)el.textContent=tot;
}

async function guardarCliente(){
  const st=document.getElementById('cd-state');st.textContent='Guardando…';st.className='savestate';
  try{
    await MagicData.guardarClienteDatos(EVAL.id,{razon_social:(CLIENTE&&CLIENTE.razon_social)||'',cif:(CLIENTE&&CLIENTE.cif)||'',alcance:document.getElementById('cd-alcance').value.trim()});
    CLIENTE=await MagicData.getClienteDatos(EVAL.id);
    st.textContent='✓ Guardado';st.className='savestate saved';setTimeout(()=>st.textContent='',2500);
  }catch(e){st.textContent='⚠ '+e.message;}
}

/* ---- Empresas ---- */
async function anadirEmpresa(){
  try{ const e=await MagicData.crearEmpresa(EVAL.id,{razon_social:'',cif:'',orden:EMPRESAS.length}); EMPRESAS.push(e); renderEmpresas(); }
  catch(e){ toast('Error: '+e.message); }
}
function leerEmpresa(empId){
  const g=(f)=>document.querySelector(`input[data-ei="${empId}"][data-ef="${f}"]`);
  return {razon_social:g('razon_social').value.trim(),cif:g('cif').value.trim()};
}
async function guardarEmpresa(empId){
  const st=document.getElementById('emp-state-'+empId);st.textContent='Guardando…';st.className='savestate';
  try{ const d=leerEmpresa(empId); await MagicData.actualizarEmpresa(empId,d); const e=EMPRESAS.find(x=>x.id===empId); if(e)Object.assign(e,d);
    st.textContent='✓ Guardado';st.className='savestate saved';setTimeout(()=>st.textContent='',2500); }
  catch(e){st.textContent='⚠ '+e.message;}
}
async function borrarEmpresa(empId){
  if(!confirm('¿Eliminar esta empresa y todos sus centros?'))return;
  try{ await MagicData.borrarEmpresa(empId); EMPRESAS=EMPRESAS.filter(x=>x.id!==empId); CENTROS=CENTROS.filter(c=>c.empresa_id!==empId); renderEmpresas(); }
  catch(e){ toast('Error: '+e.message); }
}

/* ---- Centros ---- */
async function anadirCentro(empId){
  try{ const c=await MagicData.crearCentro(EVAL.id,empId,{nombre:'',direccion:'',trabajadores:0,orden:centrosDe(empId).length}); CENTROS.push(c); renderCentros(empId); recalcTrab(); }
  catch(e){ toast('Error: '+e.message); }
}
function leerCentro(ctId){
  const g=(f)=>document.querySelector(`input[data-ci="${ctId}"][data-cf="${f}"]`);
  return {nombre:g('nombre').value.trim(),direccion:g('direccion').value.trim(),trabajadores:parseInt(g('trabajadores').value)||0};
}
async function guardarCentro(ctId){
  const st=document.getElementById('centro-state-'+ctId);st.textContent='Guardando…';st.className='savestate';
  try{ const d=leerCentro(ctId); await MagicData.actualizarCentro(ctId,d); const c=CENTROS.find(x=>x.id===ctId); if(c)Object.assign(c,d);
    st.textContent='✓ Guardado';st.className='savestate saved';setTimeout(()=>st.textContent='',2500); recalcTrab(); }
  catch(e){st.textContent='⚠ '+e.message;}
}
async function borrarCentro(ctId,empId){
  try{ await MagicData.borrarCentro(ctId); CENTROS=CENTROS.filter(x=>x.id!==ctId); renderCentros(empId); recalcTrab(); }
  catch(e){ toast('Error: '+e.message); }
}

/* ----- Pestaña de criterio ----- */
function renderCriterio(c){
  const panel=document.getElementById('panelContent');
  let html=`<div class="crit-head"><div class="kk">Criterio ${c.num} de 7</div><h2>${esc(c.titulo)}</h2></div>`;
  let bloque=null;
  c.preguntas.forEach((q,idx)=>{
    if(q.bloque!==bloque){bloque=q.bloque;html+=`<div class="bloque-tag">${esc(q.bloque)}</div>`;}
    const r=RESP[q.codigo]||{};const ans=r.puntuacion!=null;
    html+=`
    <div class="q${ans?' answered':''}" id="q-${idx}">
      <div class="q-head" onclick="toggleQ(${idx})">
        <span class="q-cod${ans?' done':''}">${esc(q.codigo)}</span>
        <div class="q-text"><div class="qt">${esc(q.pregunta)}</div><div class="qb">${esc(q.bloque)}</div></div>
        <span class="q-pill" id="pill-${idx}" style="background:${ans?COLORS[r.puntuacion]:'var(--line-strong)'};color:${ans?'#1a1407':'var(--ink-faint)'}">${ans?r.puntuacion:'—'}</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="q-body">
        ${q.justificacion_ctx?`<div class="ctx"><div class="ctx-l">Por qué importa</div><p>${esc(q.justificacion_ctx)}</p></div>`:''}
        <div class="scale">
          ${q.niveles.map((nv,i)=>{const val=ESCALA[i];const sel=r.puntuacion===val;return `<div class="opt ${sel?'sel':''}${esAuditor?' disabled':''}" ${esAuditor?'':`onclick="elegir(${idx},${val})"`}><div class="mark" style="background:${COLORS[val]}">${val}<small>${NIVEL_LBL[i]}</small></div><div class="desc">${esc(nv||'—')}</div></div>`}).join('')}
        </div>
        <label class="field-label">Justificación / hallazgos</label>
        <textarea class="ta" id="just-${idx}" ${esAuditor?'disabled':''} placeholder="${esAuditor?'(Rellenado por el cliente)':'Describe la evidencia que respalda esta puntuación…'}">${esc(r.justificacion||'')}</textarea>
        ${q.evidencias?`<details class="evid"><summary><svg class="arw" width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.6"/></svg> Evidencias sugeridas</summary><div class="evid-body">${esc(q.evidencias)}</div></details>`:''}
        <label class="field-label">Documentación de soporte</label>
        ${esAuditor?'':`<div class="dropzone" id="dz-${idx}" onclick="document.getElementById('file-${idx}').click()"><b>Haz clic para subir</b> o arrastra aquí tus archivos<small>PDF, Word, Excel, imágenes… (máx. 15 MB)</small></div><input type="file" id="file-${idx}" multiple style="display:none" onchange="subir(${idx},this.files)">`}
        <ul class="doclist" id="docs-${idx}"></ul>
        ${esAuditor?'':`<div class="saverow"><button class="btn-ghost" onclick="guardarResp(${idx})">Guardar pregunta</button><span class="savestate" id="state-${idx}"></span></div>`}
      </div>
    </div>`;
  });

  // Bloque del auditor (puntos fuertes / áreas de mejora) — visible para todos, editable solo auditor
  const a=AUDIT[c.id]||{};
  const lectura = !esAuditor;
  html+=`
    <div class="auditor-box">
      <div class="ab-l"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6 4.4 2.3 7.2L12 16.8 5.7 21l2.3-7.2-6-4.4h7.6z" stroke="currentColor" stroke-width="1.4"/></svg> Evaluación del auditor</div>
      <div class="ab-sub">${lectura?'Cumplimentado por el equipo auditor de MAGIC®.':'Solo tú (auditor) puedes editar estos campos.'}</div>
      <label class="field-label">Puntos fuertes</label>
      <textarea class="ta" id="pf" ${lectura?'disabled':''} placeholder="${lectura?'(Pendiente de evaluación)':'Fortalezas detectadas en este criterio…'}">${esc(a.puntos_fuertes||'')}</textarea>
      <label class="field-label">Aspectos de mejora</label>
      <textarea class="ta" id="am" ${lectura?'disabled':''} placeholder="${lectura?'(Pendiente de evaluación)':'Áreas de mejora y recomendaciones…'}">${esc(a.areas_mejora||'')}</textarea>
      ${lectura?'':`<div class="saverow"><button class="btn-ghost" onclick="guardarAuditor('${c.id}')">Guardar evaluación</button><span class="savestate" id="aud-state"></span></div>`}
    </div>`;

  panel.innerHTML=html;
  // pintar docs y enganchar
  c.preguntas.forEach((q,idx)=>{
    pintarDocs(idx,q.codigo);
    if(!esAuditor){
      const ta=document.getElementById('just-'+idx);if(ta)ta.addEventListener('blur',()=>guardarResp(idx,true));
      const dz=document.getElementById('dz-'+idx);
      if(dz){['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag')}));['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag')}));dz.addEventListener('drop',e=>{e.preventDefault();subir(idx,e.dataTransfer.files)});}
    }
  });
}
function curCrit(){return MODELO.criterios[tabActual-1];}
function curQ(idx){return curCrit().preguntas[idx];}
function toggleQ(i){document.getElementById('q-'+i).classList.toggle('open');}

function elegir(idx,val){
  if(esAuditor)return;
  const q=curQ(idx);RESP[q.codigo]=RESP[q.codigo]||{};RESP[q.codigo].puntuacion=val;
  const card=document.getElementById('q-'+idx);
  card.querySelectorAll('.opt').forEach((o,i)=>o.classList.toggle('sel',ESCALA[i]===val));
  const pill=document.getElementById('pill-'+idx);pill.textContent=val;pill.style.background=COLORS[val];pill.style.color='#1a1407';
  card.classList.add('answered');card.querySelector('.q-cod').classList.add('done');
  actualizarGlobal();actualizarTabs();guardarResp(idx,true);
}
async function guardarResp(idx,silent){
  if(esAuditor)return;
  const q=curQ(idx);const just=document.getElementById('just-'+idx).value;
  RESP[q.codigo]=RESP[q.codigo]||{};RESP[q.codigo].justificacion=just;
  const st=document.getElementById('state-'+idx);if(st&&!silent){st.textContent='Guardando…';st.className='savestate';}
  try{ await MagicData.guardarRespuesta(EVAL.id,{pregunta_cod:q.codigo,bloque:q.bloque,puntuacion:RESP[q.codigo].puntuacion??null,justificacion:just});
    if(st){st.textContent='✓ Guardado';st.className='savestate saved';setTimeout(()=>st.textContent='',2500);} }
  catch(e){ if(st)st.textContent='⚠ '+e.message; }
}
async function guardarAuditor(cid){
  const st=document.getElementById('aud-state');st.textContent='Guardando…';st.className='savestate';
  try{ const d={puntos_fuertes:document.getElementById('pf').value,areas_mejora:document.getElementById('am').value};
    await MagicData.guardarAuditorCriterio(EVAL.id,cid,d);AUDIT[cid]=d;
    st.textContent='✓ Guardado';st.className='savestate saved';setTimeout(()=>st.textContent='',2500); }
  catch(e){ st.textContent='⚠ '+e.message; }
}

function pintarDocs(idx,cod){
  const ul=document.getElementById('docs-'+idx);if(!ul)return;
  const list=DOCS[cod]||[];
  ul.innerHTML=list.map((d,di)=>`<li><span class="fi">${(d.nombre_archivo.split('.').pop()||'?').slice(0,4).toUpperCase()}</span><span class="fn">${d.url?`<a href="${d.url}" target="_blank" rel="noopener">${esc(d.nombre_archivo)}</a>`:esc(d.nombre_archivo)}</span><span class="fs">${fmtSize(d.tamano_bytes)}</span>${esAuditor?'':`<button class="del" onclick="borrarDoc('${cod}',${di})">×</button>`}</li>`).join('');
}
async function subir(idx,files){
  const q=curQ(idx);
  for(const f of files){
    if(f.size>15*1024*1024){toast('“'+f.name+'” supera 15 MB');continue;}
    toast('Subiendo '+f.name+'…');
    try{ const doc=await MagicData.subirDocumento(EVAL.id,q.codigo,f);(DOCS[q.codigo]=DOCS[q.codigo]||[]).push(doc);pintarDocs(idx,q.codigo);toast('✓ '+f.name); }
    catch(e){ toast('⚠ '+e.message); }
  }
  const fi=document.getElementById('file-'+idx);if(fi)fi.value='';
}
async function borrarDoc(cod,di){
  const doc=(DOCS[cod]||[])[di];if(!doc)return;
  try{ await MagicData.borrarDocumento(doc);DOCS[cod]=DOCS[cod].filter(x=>x.id!==doc.id);
    const idx=curCrit().preguntas.findIndex(q=>q.codigo===cod);pintarDocs(idx,cod); }
  catch(e){ toast('⚠ '+e.message); }
}

function actualizarGlobal(){
  let vals=[];
  MODELO.criterios.forEach(c=>c.preguntas.forEach(q=>{const v=RESP[q.codigo]?.puntuacion;if(v!=null)vals.push(v);}));
  const n=vals.length;const media=n?Math.round(vals.reduce((a,b)=>a+b,0)/n):0;
  document.getElementById('gScore').textContent=media;
  document.getElementById('gOf').textContent=`${n}/${MODELO.total_preguntas}`;
  const C=2*Math.PI*37;document.getElementById('gGauge').style.strokeDashoffset=C*(1-media/100);
  const niv=[...NIVELES].reverse().find(x=>media>=x.min)||NIVELES[0];
  document.getElementById('gGauge').setAttribute('stroke',n?niv.c:'#d4b06a');
  document.getElementById('gLevel').textContent=n?('Nivel actual: '+niv.t+'.'):'';
}

/* ---------- ZIP de evidencias (auditor) ---------- */
async function descargarZip(){
  toast('Preparando ZIP de evidencias…');
  // Cargar JSZip bajo demanda
  if(!window.JSZip){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }
  const zip=new JSZip();
  let count=0;
  for(const c of MODELO.criterios){
    for(const q of c.preguntas){
      const list=DOCS[q.codigo]||[];
      for(const d of list){
        try{ const blob=await MagicData.descargarBlob(d.storage_path);
          zip.folder(`C${c.num}_${q.codigo.replace(/\s+/g,'')}`).file(d.nombre_archivo,blob);count++; }
        catch(e){ /* omitir el que falle */ }
      }
    }
  }
  if(!count){toast('No hay documentos que descargar');return;}
  const content=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(content);
  a.download=`MAGIC_evidencias_${EVAL.organizacion.replace(/\s+/g,'_')}.zip`;a.click();
  toast(`✓ ZIP con ${count} documento(s)`);
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtSize(b){if(b==null)return'';const u=['B','KB','MB'];let i=0,n=b;while(n>=1024&&i<2){n/=1024;i++}return n.toFixed(n<10&&i>0?1:0)+' '+u[i]}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600)}
