<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso de auditor · MAGIC®</title>
<meta name="description" content="Acceso reservado a auditores del Modelo MAGIC®. Instituto de Excelencia Europea.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230b0d12'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23d4b06a' stroke-width='1'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23d4b06a' stroke-width='1' opacity='.6'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23d4b06a'/%3E%3C/svg%3E">
<meta name="theme-color" content="#0b0d12">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"></noscript>
<style>
  :root{--bg:#0b0d12;--bg-2:#11141b;--line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.18);--ink:#e9ecf2;--ink-dim:#a8aebb;--ink-faint:#8a90a0;--accent:#d4b06a;--accent-soft:rgba(212,176,106,.12);--audit:#6aa6d4;--audit-soft:rgba(106,166,212,.12);--sans:"Manrope",system-ui,sans-serif;--mono:"Manrope",ui-monospace,monospace}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 32px;background:radial-gradient(900px 500px at 50% -8%,#0e1722 0%,#000 65%)}
  a{color:var(--audit);text-decoration:none}
  .rings{position:fixed;inset:0;pointer-events:none;display:grid;place-items:center;opacity:.5}
  .rings::before,.rings::after{content:"";position:absolute;border:1px solid var(--line);border-radius:50%}
  .rings::before{width:560px;height:560px}.rings::after{width:360px;height:360px;border-color:var(--line-strong)}
  .card{position:relative;z-index:1;width:100%;max-width:440px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:40px 36px;border-top:3px solid var(--audit)}
  .logo{text-align:center;margin-bottom:8px}.logo img{height:34px;width:auto;display:inline-block}
  .sub{text-align:center;color:var(--audit);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:26px}
  .seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px;margin-bottom:24px}
  .seg button{flex:1;border:0;background:transparent;padding:11px;border-radius:6px;font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);cursor:pointer;transition:.2s}
  .seg button.on{background:var(--audit-soft);color:var(--audit)}
  .field{margin-bottom:15px}
  .field label{display:block;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px}
  .field input{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:13px 15px;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--bg);transition:.2s}
  .field input::placeholder{color:var(--ink-faint)}
  .field input:focus{outline:0;border-color:var(--audit);box-shadow:0 0 0 3px var(--audit-soft)}
  .pass-wrap{position:relative}
  .pass-wrap input{padding-right:46px;width:100%;box-sizing:border-box}
  .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:0;background:transparent;cursor:pointer;color:var(--ink-faint);display:grid;place-items:center;border-radius:6px}
  .eye:hover{color:var(--ink-dim);background:var(--audit-soft)}
  .btn{width:100%;border:0;border-radius:999px;padding:15px;font-family:var(--mono);font-weight:700;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:.2s;background:var(--audit);color:#06121d}
  .btn:hover{background:#86bce0}.btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;font-size:13px;font-weight:600;min-height:18px;text-align:center}
  .msg.err{color:#e0564f}.msg.ok{color:#5ba897}
  .foot{text-align:center;margin-top:22px;font-size:12px;color:var(--ink-faint)}
  .foot a{color:var(--ink-dim)}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(6,18,29,.3);border-top-color:#06121d;border-radius:50%;animation:r .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes r{to{transform:rotate(360deg)}}
  .back{position:fixed;top:22px;left:24px;z-index:2;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);display:flex;align-items:center;gap:7px}
  .back:hover{color:var(--audit);text-decoration:none}
  .note{background:var(--audit-soft);border:1px solid rgba(106,166,212,.3);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--ink-dim);line-height:1.5;margin-bottom:18px}
  .access-bar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:center;gap:8px;padding:12px;background:rgba(11,13,18,.7);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .access-bar a{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:999px;color:var(--ink-dim);border:1px solid var(--line);transition:.18s}
  .access-bar a:hover{color:var(--ink);border-color:var(--line-strong)}
  .access-bar a.on-cli{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .access-bar a.on-aud{color:#6aa6d4;border-color:#6aa6d4;background:rgba(106,166,212,.12)}
  .access-bar a.on-eli{color:#d4b06a;border-color:#d4b06a;background:rgba(212,176,106,.12)}
  @media(max-width:520px){.access-bar a{font-size:9px;padding:6px 9px;letter-spacing:.05em}}
  /* Ultrarresponsivo */
  *{max-width:100%}
  img{height:auto}
  @media(max-width:560px){
    body{padding:74px 14px 28px}
    .card{padding:30px 22px}
    .access-bar{gap:6px;padding:10px 8px}
    .access-bar a{font-size:8.5px;padding:6px 8px}
  }
  @media(max-width:360px){
    .access-bar a{font-size:8px;padding:5px 6px;letter-spacing:0}
    .card{padding:26px 18px}
  }
</style>
</head>
<body>
<div class="rings"></div>
<div class="access-bar"><a href="login.html">Soy MAGIC®</a><a href="login-auditor.html" class="on-aud">Auditor MAGIC®</a><a href="login-elite.html">Elite MAGIC® Club</a></div>

<div class="card">
  <div class="logo"><picture><source srcset="assets/magic_logo-sm.webp" type="image/webp"><img src="assets/magic_logo.png" alt="MAGIC®" width="229" height="72"></picture></div>
  <div class="sub">Acceso de auditor</div>

  <div class="seg">
    <button id="tabLogin" class="on" onclick="setModo('login')">Iniciar sesión</button>
    <button id="tabReg" onclick="setModo('registro')">Alta de auditor</button>
  </div>

  <div id="regNote" class="note" style="display:none">El alta de auditor requiere un <b>código de invitación</b> facilitado por el Instituto de Excelencia Europea. Sin un código válido no es posible registrarse como auditor.</div>

  <div class="field" id="fNombre" style="display:none">
    <label>Nombre</label>
    <input id="inNombre" type="text" placeholder="Tu nombre" autocomplete="name">
  </div>
  <div class="field">
    <label>Email</label>
    <input id="inEmail" type="email" placeholder="auditor@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <div class="pass-wrap">
      <input id="inPass" type="password" placeholder="Tu contraseña" autocomplete="current-password">
      <button type="button" class="eye" onclick="verPass('inPass',this)" aria-label="Mostrar u ocultar la contraseña"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>
  <div class="field" id="fPass2" style="display:none">
    <label>Repetir contraseña</label>
    <div class="pass-wrap">
      <input id="inPass2" type="password" placeholder="Vuelve a escribir la contraseña" autocomplete="new-password">
      <button type="button" class="eye" onclick="verPass('inPass2',this)" aria-label="Mostrar u ocultar la contraseña"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>
  <div class="field" id="fCodigo" style="display:none">
    <label>Código de invitación de auditor</label>
    <input id="inCodigo" type="text" placeholder="Ej.: MAGIC-AUD-2026" autocomplete="off">
  </div>

  <button class="btn" id="btnGo" onclick="accion()">Entrar</button>
  <div class="msg" id="msg"></div>
  <p class="foot">
    <a href="login.html">Soy MAGIC® (cliente) →</a>
    &nbsp;·&nbsp;
    <a href="login-elite.html" style="color:#d4b06a">Elite MAGIC® Club →</a>
  </p>
</div>

<script src="assets/magic-auth.js?v=33"></script>
<script src="assets/magic-data.js?v=33"></script>
<script>
let modo='login';
function verPass(id,btn){
  const inp=document.getElementById(id);
  const ver = inp.type==='password';
  inp.type = ver?'text':'password';
  btn.innerHTML = ver
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
}
function setModo(m){
  modo=m;
  document.getElementById('tabLogin').classList.toggle('on',m==='login');
  document.getElementById('tabReg').classList.toggle('on',m==='registro');
  document.getElementById('fNombre').style.display=m==='registro'?'block':'none';
  document.getElementById('fPass2').style.display=m==='registro'?'block':'none';
  document.getElementById('fCodigo').style.display=m==='registro'?'block':'none';
  document.getElementById('regNote').style.display=m==='registro'?'block':'none';
  document.getElementById('btnGo').textContent=m==='registro'?'Crear cuenta de auditor':'Entrar';
  document.getElementById('inPass').autocomplete=m==='registro'?'new-password':'current-password';
  document.getElementById('msg').textContent='';
}

async function irDestino(){
  const perfil = await window.MagicAuth.perfil();
  if (perfil && (perfil.rol==='auditor' || perfil.rol==='superadmin')) {
    window.location.href = 'panel.html';
  } else {
    // No es auditor: lo mandamos al acceso de clientes
    document.getElementById('msg').className='msg err';
    document.getElementById('msg').textContent='Esta cuenta no es de auditor. Usa el acceso de clientes.';
  }
}

async function accion(){
  const email=document.getElementById('inEmail').value.trim();
  const pass=document.getElementById('inPass').value;
  const nombre=document.getElementById('inNombre').value.trim();
  const codigo=document.getElementById('inCodigo').value.trim();
  const msg=document.getElementById('msg'), btn=document.getElementById('btnGo');
  if(!email||!pass){msg.className='msg err';msg.textContent='Introduce email y contraseña.';return;}
  if(modo==='registro'){
    if(pass.length<6){msg.className='msg err';msg.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
    if(pass!==document.getElementById('inPass2').value){msg.className='msg err';msg.textContent='Las contraseñas no coinciden.';return;}
    if(!codigo){msg.className='msg err';msg.textContent='Necesitas un código de invitación de auditor.';return;}
  }
  btn.disabled=true;const orig=btn.textContent;btn.innerHTML='<span class="spin"></span>Procesando…';
  try{
    if(modo==='registro'){
      await window.MagicAuth.registrar(email,pass,nombre);
      // Iniciar sesión para poder canjear el código
      try{
        await window.MagicAuth.entrar(email,pass);
        const res = await window.MagicData.canjearCodigoAuditor(codigo);
        if(res!=='ok'){
          msg.className='msg err';
          msg.textContent = traducirCodigo(res);
          btn.disabled=false; btn.textContent=orig;
          return;
        }
        await irDestino();
      }catch(e){
        msg.className='msg ok';
        msg.textContent='Cuenta creada. Si tu proyecto exige confirmar email, confírmalo y luego inicia sesión e introduce el código.';
        setModo('login'); btn.disabled=false; btn.textContent='Entrar';
      }
    }else{
      await window.MagicAuth.entrar(email,pass);
      await irDestino();
    }
  }catch(e){
    msg.className='msg err';
    msg.textContent=(e&&e.message)?traducir(e.message):'No se pudo completar la operación.';
    btn.disabled=false;btn.textContent=orig;
  }
}
function traducir(m){
  if(/Invalid login/i.test(m)) return 'Email o contraseña incorrectos.';
  if(/already registered/i.test(m)) return 'Ese email ya tiene cuenta. Inicia sesión e introduce el código en tu primer acceso.';
  if(/Email not confirmed/i.test(m)) return 'Debes confirmar tu email antes de entrar.';
  return m;
}
function traducirCodigo(r){
  switch(r){
    case 'codigo_invalido': return 'El código de invitación no es válido.';
    case 'codigo_inactivo': return 'Ese código ya no está activo.';
    case 'codigo_caducado': return 'El código ha caducado.';
    case 'codigo_agotado': return 'El código ya ha alcanzado su número máximo de usos.';
    case 'no_autenticado': return 'Sesión no iniciada. Inténtalo de nuevo.';
    default: return 'No se pudo validar el código.';
  }
}
document.addEventListener('magic-ready', async ()=>{
  const s = await window.MagicAuth.sesion();
  if (s) irDestino();
});
document.getElementById('inPass').addEventListener('keydown',e=>{if(e.key==='Enter'&&modo==='login')accion();});
document.getElementById('inCodigo').addEventListener('keydown',e=>{if(e.key==='Enter')accion();});
</script>
</body>
</html>
