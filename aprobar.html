<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprobar usuario · MAGIC®</title>
<meta name="theme-color" content="#0b0d12">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230b0d12'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23d4b06a' stroke-width='1'/%3E%3C/svg%3E">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(900px 500px at 50% -8%,#141b27,#000 65%);font-family:"Manrope",system-ui,sans-serif;color:#e9ecf2;padding:24px}
  .card{max-width:440px;width:100%;background:#11141b;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:40px 34px;text-align:center}
  .ic{width:64px;height:64px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;font-size:30px}
  .ic.ok{background:rgba(91,168,151,.15);color:#5ba897}.ic.err{background:rgba(224,86,79,.15);color:#e0564f}.ic.wait{background:rgba(212,176,106,.12);color:#d4b06a}
  h1{font-size:22px;font-weight:600;margin:0 0 10px}
  p{color:#a8aebb;font-size:14px;line-height:1.6;margin:0 0 8px}
  .sub{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a90a0;margin-bottom:22px}
  a.btn{display:inline-block;margin-top:18px;background:#d4b06a;color:#1a1407;text-decoration:none;padding:12px 24px;border-radius:999px;font-family:ui-monospace,monospace;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .spin{display:inline-block;width:22px;height:22px;border:3px solid rgba(212,176,106,.3);border-top-color:#d4b06a;border-radius:50%;animation:r .7s linear infinite}@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="ic wait"><span class="spin"></span></div>
  <div class="sub">Modelo MAGIC®</div>
  <h1>Procesando aprobación…</h1>
  <p>Validando el enlace, un momento.</p>
</div>

<script src="assets/magic-auth.js?v=28"></script>
<script>
function pinta(tipo,titulo,texto,boton){
  const ic={ok:'✓',err:'✕',wait:''}[tipo];
  document.getElementById('card').innerHTML=
    `<div class="ic ${tipo}">${ic}</div><div class="sub">Modelo MAGIC®</div><h1>${titulo}</h1><p>${texto}</p>`+
    (boton?`<a class="btn" href="${boton.href}">${boton.txt}</a>`:'');
}
document.addEventListener('magic-ready', async ()=>{
  const token=new URLSearchParams(location.search).get('token');
  if(!token){ pinta('err','Enlace no válido','Falta el código de aprobación en el enlace.'); return; }
  try{
    const { data, error } = await sb.rpc('aprobar_por_token',{ p_token: token });
    if(error) throw error;
    if(data==='ok')          pinta('ok','Usuario aprobado','La cuenta ya puede acceder y usar la autoevaluación MAGIC®.');
    else if(data==='ya_aprobado') pinta('ok','Ya estaba aprobado','Esta cuenta ya había sido aprobada anteriormente.');
    else                     pinta('err','Enlace no válido','El código de aprobación no es correcto o ya se ha usado.');
  }catch(e){
    pinta('err','No se pudo aprobar', (e&&e.message)?e.message:'Inténtalo de nuevo más tarde.');
  }
});
</script>
</body>
</html>
